<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - V&V Filming</title>
    <meta name="description" content="Get in touch with V&V Filming for your filming needs. We're here to help you capture your special moments!">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="Main style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>V&V Filming</h1>
            <nav>
                <div class="hamburger" id="hamburger">
                    <div></div>
                    <div></div>
                    <div></div>
                </div>
                <div class="dropdown" id="dropdown">
                    <a href="index.html">Home</a>
                    <a href="service.html">Services</a>
                    <a href="about.html">About Us</a>
                    <a href="contact.html">Contact</a>
                    <a href="upload.html">Our Work</a>
                </div>
            </nav>
        </div>
    </header>

    <section id="contact">
        <div class="container">
            <h2>Contact Us</h2>
            <p>We'd love to hear from you! Whether you have questions, need more information about our services, or want to discuss a project, feel free to reach out.</p>
            <form id="contact-form" action="server.php" method="POST">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <button type="submit" class="cta-button">Send</button>
            </form>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2024 V&V Filming. All rights reserved.</p>
            <div class="socials">
                <a href="#"><i class="fab fa-facebook-f"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </footer>

    <script src="server.js"></script>
    <script>
        // Hamburger menu toggle
        const hamburger = document.getElementById('hamburger');
        const dropdown = document.getElementById('dropdown');

        hamburger.addEventListener('click', () => {
            dropdown.classList.toggle('show');
        });
    </script>
</body>
</html>
